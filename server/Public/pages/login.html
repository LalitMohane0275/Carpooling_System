<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../styles/login_new.css">
    <title>Login</title>
</head>

<body>
    <div class="wrapper">
        <div class="form-container sign-in">
            <form action="/login" method="POST"> <!-- Specify the login route and use POST method -->
                <h2>Login</h2>
                <div class="form-group">
                    <input type="text" name="username" required> <!-- Add name attribute for form submission -->
                    <i class="fas fa-user"></i>
                    <label for="username">Username</label>
                </div>
                <div class="form-group">
                    <input type="password" name="password" required> <!-- Add name attribute for form submission -->
                    <i class="fas fa-lock"></i>
                    <label for="password">Password</label>
                </div>
                <div class="forgot-pass">
                    <a href="#">Forgot Password?</a>
                </div>
                <button type="submit" class="btn">Login</button>
                <div class="link">
                    <p>Don't have an account?<a href="./signup" class="signup-link"> Sign up</a></p>
                </div>
            </form>
        </div>
    </div>
    <!-- <script src="https://kit.fontawesome.com/9e5ba2e3f5.js" crossorigin="anonymous"></script> -->
    <!-- <script src="../scripts/login_new.js"></script> -->
</body>

</html>

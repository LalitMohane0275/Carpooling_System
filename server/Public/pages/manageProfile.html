<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Carpooling Website - Manage Profile</title>
    <link rel="stylesheet" href="../styles/manageProfile.css" />
  </head>
  <body>
    <header>
      <div class="left">
        <img src="../assets/logos/logo3.svg" alt="logo" height="40" />
        <h1>Ride Buddy</h1>
      </div>

      <nav class="right">
        <ul class="nav_links">
          <li><a href="/home">Home</a></li>
          <li><a href="/publishRide">Publish Ride</a></li>
          <li><a href="/seachRide">Search Ride</a></li>
          <li><a href="/about">About</a></li>
        </ul>
      </nav>
      <a href="/profile" class="cta">
        <img
          class="profile"
          src="../assets/logos/user-profile-svgrepo-com.svg"
          alt="logo"
          height="40"
        />
      </a>
    </header>
    <h1>Manage Profile</h1>
    <div class="container">
        <img src="../assets/images/person-using-currency-exchange-app.png" alt="" height="240">
      <div class="profile-form-container">
        <h2>Profile Information</h2>
        <form id="profile-form">
          <label for="name">Name:</label>
          <input type="text" id="name" name="name" required />
          <br />
          <label for="email">Email:</label>
          <input type="email" id="email" name="email" required />
          <br />
          <label for="phone">Phone Number:</label>
          <input type="tel" id="phone" name="phone" />
          <br />
          <label for="bio">Bio:</label>
          <textarea id="bio" name="bio" rows="5"></textarea>
          <!-- <input type="text" id="bio" name="bio" required> -->
          <br />
          <label for="profile-picture">Profile Picture:</label>
          <input
            type="file"
            id="profile-picture"
            name="profile-picture"
            accept="image/*"
          />
          <br />
          <button type="submit">Save Changes</button>
        </form>
      </div>
    </div>
  </body>
</html>
